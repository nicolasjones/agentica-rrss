name: AGENMATICA CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: agenmatica
          POSTGRES_PASSWORD: agenmatica
          POSTGRES_DB: agenmatica_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Lint
        run: |
          cd backend
          ruff check app/

      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://agenmatica:agenmatica@localhost:5432/agenmatica_test
          MOCK_LLM: true
          MOCK_SOCIAL_APIS: true
          APP_ENV: test
        run: |
          cd backend
          pytest tests/ -v --cov=app --cov-report=term-missing

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install & Build
        run: |
          cd frontend
          npm ci
          npm run build

  deploy:
    needs: [backend-test, frontend-build]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy to Render
        run: echo "Deploy triggered via Render webhook (auto-deploy from GitHub)"
        # Render auto-deploys from main branch
